<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Upload | TechNova Solutions</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="hero">
  <div class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div>
        <h1>Upload Tutorials</h1>
        <p class="tagline">Add learning materials</p>
      </div>
    </div>

    <nav class="site-nav">
      <a href="admin.html">Dashboard</a>
      <a href="admin_users.html">Users</a>
      <a href="admin_bookings.html">Bookings</a>
      <a href="index.html">View Site</a>
      <a href="#" id="admin-signout">Sign out</a>
    </nav>
  </div>
</header>

<main class="container">

  <!-- UPLOAD FORM -->
  <section>
    <h2>Upload Documents & Tutorials</h2>

    <form id="upload-form" class="contact-form">

      <div class="form-group">
        <label>Title</label>
        <input id="t-title" type="text" required />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="t-desc" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="t-category">
          <option>Notes</option>
          <option>Tutorial</option>
          <option>Exercise</option>
          <option>PDF Guide</option>
          <option>Video Resource</option>
          <option>Powerpoint</option>
        </select>
      </div>

      <div class="form-group">
        <label>Upload File</label>
        <input id="t-file" type="file"
          accept=".pdf,.doc,.docx,.txt,.jpg,.png,.gif,.ppt,.pptx"/>
      </div>

      <div class="form-group">
        <label>OR External Link</label>
        <input id="t-link" type="url" />
      </div>

      <div class="form-actions">
        <button class="button" type="submit">Save</button>
      </div>

    </form>
  </section>

  <!-- LIST -->
  <section>
    <h2>Existing Tutorials</h2>
    <div id="tutorials-list" class="resource-grid"></div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <p>Admin system (localStorage demo)</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.431.0/dist/lucide.min.js"></script>

<script>
/* =======================
   STORAGE SETUP
======================= */
const KEY = 'technova_tutorials';

function getTutorials(){
  return JSON.parse(localStorage.getItem(KEY) || '[]');
}

function saveTutorials(data){
  localStorage.setItem(KEY, JSON.stringify(data));

  // notify student pages
  window.dispatchEvent(new Event('tutorialsUpdated'));
}

/* =======================
   ICON HELPERS
======================= */
function getFileExtIcon(filename){
  const ext = filename?.split('.').pop().toLowerCase();

  if(['pdf'].includes(ext)) return '<i data-lucide="file-text"></i>';
  if(['doc','docx'].includes(ext)) return '<i data-lucide="file-text"></i>';
  if(['ppt','pptx'].includes(ext)) return '<i data-lucide="presentation"></i>';
  if(['jpg','png','gif'].includes(ext)) return '<i data-lucide="image"></i>';
  if(['txt'].includes(ext)) return '<i data-lucide="file-text"></i>';

  return '<i data-lucide="link-2"></i>';
}

function getCategoryIcon(cat){
  const c = (cat || '').toLowerCase();

  if(c.includes('notes')) return '<i data-lucide="book-open"></i>';
  if(c.includes('tutorial')) return '<i data-lucide="play-circle"></i>';
  if(c.includes('exercise')) return '<i data-lucide="code"></i>';
  if(c.includes('video')) return '<i data-lucide="video"></i>';
  if(c.includes('powerpoint')) return '<i data-lucide="presentation"></i>';

  return '<i data-lucide="archive"></i>';
}

/* =======================
   RENDER
======================= */
function renderTutorials(){
  const list = getTutorials();
  const container = document.getElementById('tutorials-list');

  container.innerHTML = '';

  if(list.length === 0){
    container.innerHTML = "<p>No uploads yet.</p>";
    return;
  }

  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'resource-card';

    const fileBtn = t.file
      ? `<a class="button button-secondary" download="${t.filename}" href="${t.file}">Download</a>`
      : '';

    const linkBtn = t.link
      ? `<a class="button button-secondary" target="_blank" href="${t.link}">Open</a>`
      : '';

    card.innerHTML = `
      <h3>${getFileExtIcon(t.filename)} ${t.title}</h3>
      <p>${getCategoryIcon(t.category)} ${t.category}</p>
      <p>${t.desc || ''}</p>
      <small>${t.filename || 'External link'}</small>

      <div style="display:flex;gap:8px;margin-top:10px">
        ${fileBtn}
        ${linkBtn}
        <button data-i="${i}" class="delete-btn">Delete</button>
      </div>
    `;

    container.appendChild(card);
  });

  lucide.replace();

  document.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.onclick = () => {
      const i = btn.dataset.i;
      const arr = getTutorials();
      arr.splice(i,1);
      saveTutorials(arr);
      renderTutorials();
    };
  });
}

/* =======================
   UPLOAD HANDLER
======================= */
document.getElementById('upload-form').addEventListener('submit', e=>{
  e.preventDefault();

  const title = document.getElementById('t-title').value;
  const desc = document.getElementById('t-desc').value;
  const category = document.getElementById('t-category').value;
  const link = document.getElementById('t-link').value;
  const fileInput = document.getElementById('t-file');

  const tutorial = {
    title,
    desc,
    category,
    link,
    created: new Date().toISOString()
  };

  const save = () => {
    const arr = getTutorials();
    arr.unshift(tutorial);
    saveTutorials(arr);

    renderTutorials();
    e.target.reset();
    alert("Uploaded successfully!");
  };

  if(fileInput.files.length > 0){
    const file = fileInput.files[0];

    tutorial.filename = file.name;
    tutorial.filesize = file.size;

    const reader = new FileReader();
    reader.onload = e => {
      tutorial.file = e.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    save();
  }
});

renderTutorials();

/* =======================
   ADMIN SIGNOUT
======================= */
document.getElementById('admin-signout').onclick = e=>{
  e.preventDefault();
  localStorage.removeItem('technova_admin_session');
  window.location.href = 'admin_login.html';
};
</script>

<script>
if(!localStorage.getItem('technova_admin_session')){
  window.location.href = 'admin_login.html';
}
</script>

</body>
</html>
