<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div>
        <h1>Student Dashboard</h1>
      </div>
    </div>
  </div>
</header>

<main class="container">

  <h2>Uploaded Tutorials</h2>

  <div id="student-list" class="resource-grid"></div>

</main>

<script>
const KEY = "technova_tutorials";

/* LOAD FILES */
function loadTutorials(){
  const data = JSON.parse(localStorage.getItem(KEY) || "[]");

  const container = document.getElementById("student-list");

  if(data.length === 0){
    container.innerHTML = "<p>No uploads yet</p>";
    return;
  }

  container.innerHTML = data.map(t => `
    <div class="resource-card">
      <h3>${t.title}</h3>
      <p>${t.desc || ""}</p>

      <p><b>${t.category}</b></p>

      ${t.file ? `
        <a class="button button-secondary" href="${t.file}" download="${t.filename}">
          Download
        </a>
      ` : ""}

      ${t.link ? `
        <a class="button button-secondary" target="_blank" href="${t.link}">
          Open Link
        </a>
      ` : ""}
    </div>
  `).join("");
}

/* INIT */
loadTutorials();

/* LIVE UPDATE */
window.addEventListener("storage", loadTutorials);
window.addEventListener("tutorialsUpdated", loadTutorials);
</script>

</body>
</html>
