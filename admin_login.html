<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | TechNova Solutions</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="hero">
  <div class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div>
        <h1>TechNova Admin</h1>
        <p class="tagline">Secure admin access</p>
      </div>
    </div>

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="index.html">View Site</a>
    </nav>
  </div>
</header>

<main class="container">
  <section>
    <h2>Admin Login</h2>

    <form id="login-form" class="contact-form">
      
      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" required />
      </div>

      <div class="form-actions">
        <button class="button" type="submit">Sign In</button>
      </div>

    </form>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p>Admin demo login system</p>
  </div>
</footer>

<script>
/* =========================
   HARD-CODED ADMIN CREDENTIALS
========================= */
const ADMIN_EMAIL = "abdulaiposuwa273@central.edu.sl";
const ADMIN_PASSWORD = "Abp2007";

const SESSION_KEY = "technova_admin_session";

/* =========================
   AUTO REDIRECT IF LOGGED IN
========================= */
(function () {
  const session = localStorage.getItem(SESSION_KEY);
  if (session) {
    window.location.href = "admin.html";
  }
})();

/* =========================
   LOGIN HANDLER
========================= */
document.getElementById("login-form").addEventListener("submit", function (e) {
  e.preventDefault();

  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;

  if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {

    // create session
    localStorage.setItem(
      SESSION_KEY,
      JSON.stringify({
        email: email,
        loginTime: Date.now()
      })
    );

    alert("Login successful!");
    window.location.href = "admin.html";

  } else {
    alert("Invalid email or password");
  }
});
</script>

</body>
</html>
